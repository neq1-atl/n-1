<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | n=1</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            text-align: left;
            box-sizing: border-box;
        }

        .contact-title {
            color: var(--text-color);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            border-bottom: 3px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px; 
            font-family: inherit;
            border: 1px solid rgba(99, 112, 174, 0.2);
            border-radius: var(--radius-card);
            background-color: #fff;
            color: var(--text-color);
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 112, 174, 0.1);
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--radius-button);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s, filter 0.2s;
            box-shadow: 0 4px 15px rgba(188, 126, 157, 0.3);
        }

        .submit-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background-color: var(--secondary-color);
            cursor: not-allowed;
            opacity: 0.8;
            transform: none;
        }

        #status-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: var(--radius-card);
            font-size: 0.95rem;
            display: none;
            text-align: center;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-success {
            background-color: rgba(99, 112, 174, 0.08);
            color: var(--primary-color);
            border: 1px solid rgba(99, 112, 174, 0.15);
            display: block !important;
        }

        .status-error {
            background-color: rgba(188, 126, 157, 0.08);
            color: var(--accent-color);
            border: 1px solid rgba(188, 126, 157, 0.15);
            display: block !important;
        }

        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .footer-action {
            margin-top: 3rem;
            text-align: center;
        }

        .back-link {
            font-size: 0.9rem;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 0.6;
            color: var(--accent-color);
        }

        .honeypot-field {
            display: none !important;
            visibility: hidden;
        }
        @media (max-width: 480px) {
            .contact-container {
                margin: 40px auto;
                padding: 24px;
            }
        }
    </style>
</head>
<body class="contact-page">
    <div class="gradient-bg"></div>

    <div class="container">
        <div class="contact-container content-card">
            <h1 class="contact-title">Contact</h1>
            
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">お名前 <span style="font-size: 0.75rem; color: var(--accent-color); margin-left: 4px;">(必須)</span></label>
                    <input type="text" id="name" name="name" required placeholder="ニックネーム可">
                </div>
                
                <div class="form-group">
                    <label for="email">メールアドレス <span style="font-size: 0.75rem; color: var(--accent-color); margin-left: 4px;">(必須)</span></label>
                    <input type="email" id="email" name="email" required placeholder="sample@example.com">
                </div>
                
                <div class="form-group">
                    <label for="message">お問い合わせ内容 <span style="font-size: 0.75rem; color: var(--accent-color); margin-left: 4px;">(必須)</span></label>
                    <textarea id="message" name="message" required placeholder="ご自由に入力してください"></textarea>
                </div>
                
                <div class="form-group honeypot-field">
                    <label for="honeypot">Do not fill this</label>
                    <input type="text" id="honeypot" name="honeypot" tabindex="-1" autocomplete="off">
                </div>
                
                <button type="submit" id="submit-btn" class="submit-btn transition">
                    <span id="btn-text">送信する</span>
                </button>
            </form>

            <div id="status-message"></div>

            <div class="footer-action">
                <a href="privacy.html" class="back-link">← Back to Privacy Policy</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const statusMsg = document.getElementById('status-message');

        const ENCODED_URL = 'aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J3cXV2dGU0eEc0TXIyRFhZWHFVZTQyM0Y3dE14U3pBUUxuMnJIQnhnQWJLY3VtYUVFSlA1WlNjZ3VZYWRVVFE5dWgvZXhlYw=='; 
        const GAS_URL = ENCODED_URL ? atob(ENCODED_URL) : '';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (form.honeypot.value) {
                statusMsg.textContent = 'お問い合わせを受け付けました。ありがとうございます。';
                statusMsg.classList.add('status-success');
                form.reset();
                btnText.textContent = '送信完了';
                return;
            }

            if (!GAS_URL) {
                alert('GASのURLが設定されていません。');
                return;
            }

            submitBtn.disabled = true;
            btnText.innerHTML = '送信中<span class="loading-dots"></span>';
            statusMsg.className = '';
            statusMsg.style.display = 'none';

            const formData = new FormData(form);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                message: formData.get('message'),
                honeypot: formData.get('honeypot')
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify(data)
                });

                statusMsg.textContent = 'お問い合わせを受け付けました。ありがとうございます。';
                statusMsg.classList.add('status-success');
                form.reset();
                btnText.textContent = '送信完了';

            } catch (error) {
                statusMsg.textContent = '送信に失敗しました。時間をおいて再度お試しください。';
                statusMsg.classList.add('status-error');
                submitBtn.disabled = false;
                btnText.textContent = '送信する';
            }
        });
    </script>
</body>
</html>
