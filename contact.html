<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | n=1</title>
    <meta name="description" content="Contact n=1. Please feel free to reach out for inquiries or feedback.">
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">
    <div class="container">
        <div class="contact-container">
            <h1 class="contact-title">Contact</h1>
            
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">お名前 <span style="font-size: 0.75rem; color: var(--accent-color); margin-left: 4px;">(必須)</span></label>
                    <input type="text" id="name" name="name" required placeholder="ニックネーム可">
                </div>
                
                <div class="form-group">
                    <label for="email">メールアドレス <span style="font-size: 0.75rem; color: var(--accent-color); margin-left: 4px;">(必須)</span></label>
                    <input type="email" id="email" name="email" required placeholder="sample@example.com">
                </div>
                
                <div class="form-group">
                    <label for="message">お問い合わせ内容 <span style="font-size: 0.75rem; color: var(--accent-color); margin-left: 4px;">(必須)</span></label>
                    <textarea id="message" name="message" required placeholder="ご自由に入力してください"></textarea>
                </div>
                
                <div class="form-group honeypot-field">
                    <label for="honeypot">Do not fill this</label>
                    <input type="text" id="honeypot" name="honeypot" tabindex="-1" autocomplete="off">
                </div>
                
                <button type="submit" id="submit-btn" class="submit-btn transition">
                    <span id="btn-text">送信する</span>
                </button>
            </form>

            <div id="status-message"></div>

            <div class="footer-action">
                <a href="privacy.html" class="back-link">← Back to Privacy Policy</a>
            </div>
        </div>
    </div>

    <footer class="main-footer">
      <div class="footer-inner">
        <nav class="footer-nav">
          <a href="privacy.html" class="footer-link-white">Privacy Policy</a>
          <a href="contact.html" class="footer-link-white">Contact</a>
        </nav>
        <div class="footer-copyright-white">© 2026 n=1</div>
      </div>
    </footer>

    <script>
        const form = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const statusMsg = document.getElementById('status-message');

        const ENCODED_URL = 'aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J3cXV2dGU0eEc0TXIyRFhZWHFVZTQyM0Y3dE14U3pBUUxuMnJIQnhnQWJLY3VtYUVFSlA1WlNjZ3VZYWRVVFE5dWgvZXhlYw=='; 
        const GAS_URL = ENCODED_URL ? atob(ENCODED_URL) : '';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (form.honeypot.value) {
                statusMsg.textContent = 'お問い合わせを受け付けました。ありがとうございます。';
                statusMsg.classList.add('status-success');
                form.reset();
                btnText.textContent = '送信完了';
                return;
            }

            if (!GAS_URL) {
                alert('GASのURLが設定されていません。');
                return;
            }

            submitBtn.disabled = true;
            btnText.innerHTML = '送信中<span class="loading-dots"></span>';
            statusMsg.className = '';
            statusMsg.style.display = 'none';

            const formData = new FormData(form);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                message: formData.get('message'),
                honeypot: formData.get('honeypot')
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify(data)
                });

                statusMsg.textContent = 'お問い合わせを受け付けました。ありがとうございます。';
                statusMsg.classList.add('status-success');
                form.reset();
                btnText.textContent = '送信完了';

            } catch (error) {
                statusMsg.textContent = '送信に失敗しました。時間をおいて再度お試しください。';
                statusMsg.classList.add('status-error');
                submitBtn.disabled = false;
                btnText.textContent = '送信する';
            }
        });
    </script>
</body>
</html>
